<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 ShopBuddy — Your Smart Shopping Companion</title>
  <style>
    :root {
      --bg: #0b0f1a; --surface: #141c2f; --surface2: #1c2744; --border: #2d3a5c;
      --text: #e6eaf4; --text2: #8d99b8; --accent: #6c5ce7; --accent2: #a29bfe;
      --green: #00d4aa; --blue: #74b9ff; --warning: #fdcb6e; --danger: #e17055;
      --orange: #e17055; --radius: 14px; --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
    .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

    /* Header */
    header { background: linear-gradient(135deg, #0d1326, #162040, #0d1326); border-bottom: 1px solid var(--border); padding: 30px 0; text-align: center; }
    header h1 { font-size: 2.4em; background: linear-gradient(135deg, var(--accent2), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    header p { color: var(--text2); font-size: 1.1em; margin-top: 4px; }

    /* Views */
    .view { display: none; padding: 30px 0; }
    .view.active { display: block; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .card h2 { color: var(--accent2); margin-bottom: 12px; }
    .card h3 { color: var(--accent2); margin-bottom: 10px; }

    /* Category Grid */
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 24px; }
    .cat-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 28px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .cat-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(108,92,231,0.2); }
    .cat-card .icon { font-size: 3em; margin-bottom: 12px; }
    .cat-card .name { font-size: 1.3em; font-weight: 700; margin-bottom: 6px; }
    .cat-card .tagline { color: var(--text2); font-size: 0.9em; }
    .cat-card-coming { opacity: 0.4; pointer-events: none; }
    .coming-badge { background: var(--border); color: var(--text2); padding: 4px 12px; border-radius: 12px; font-size: 0.8em; margin-top: 8px; display: inline-block; }

    /* Buddy flow */
    .phase { display: none; animation: fadeIn 0.4s; }
    .phase.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .progress-bar { display: flex; align-items: center; gap: 4px; margin-bottom: 28px; }
    .progress-seg { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
    .progress-seg.done { background: var(--accent); }
    .progress-seg.current { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

    /* Consideration cards */
    .consider-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 12px; }
    .consider-card h4 { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .consider-card p { color: var(--text2); font-size: 0.92em; }
    .consider-card .rec { margin-top: 10px; padding: 10px 14px; background: rgba(108,92,231,0.1); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; color: var(--accent2); font-size: 0.88em; }
    .importance { padding: 2px 8px; border-radius: 10px; font-size: 0.7em; font-weight: 700; }
    .importance-critical { background: rgba(225,112,85,0.2); color: var(--orange); }
    .importance-important { background: rgba(253,203,110,0.2); color: var(--warning); }
    .importance-moderate { background: rgba(116,185,255,0.2); color: var(--blue); }
    .importance-nice-to-have { background: rgba(0,212,170,0.15); color: var(--green); }
    .importance-often-overlooked { background: rgba(162,155,254,0.15); color: var(--accent2); }

    /* Jargon */
    .jargon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
    .jargon-item { padding: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; }
    .jargon-item .term { color: var(--accent2); font-weight: 700; font-size: 0.95em; }
    .jargon-item .meaning { color: var(--text2); font-size: 0.85em; margin-top: 4px; }

    /* Questions */
    .option-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin: 16px 0; }
    .option-card { background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .option-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .option-card.selected { border-color: var(--accent); background: rgba(108,92,231,0.1); }
    .option-card .icon { font-size: 2em; margin-bottom: 6px; }
    .option-card .label { font-weight: 600; font-size: 0.95em; }
    .option-card .desc { font-size: 0.78em; color: var(--text2); margin-top: 4px; }
    .q-counter { color: var(--text2); font-size: 0.9em; margin-bottom: 6px; }

    /* Results */
    .result-hero { background: linear-gradient(135deg, rgba(108,92,231,0.12), rgba(116,185,255,0.08)); border: 2px solid var(--accent); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; position: relative; }
    .result-hero .badge { position: absolute; top: -12px; left: 20px; background: var(--accent); color: white; padding: 4px 14px; border-radius: 6px; font-size: 0.8em; font-weight: 700; }
    .result-hero h3 { font-size: 1.5em; color: var(--text); margin-bottom: 4px; }
    .result-hero .brand { color: var(--text2); }
    .result-hero .price { font-size: 2em; font-weight: 800; color: var(--accent2); margin: 12px 0; }
    .result-hero .match { color: var(--green); font-weight: 600; margin-bottom: 12px; }
    .spec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 16px 0; }
    .spec { background: var(--bg); border-radius: 8px; padding: 10px 14px; text-align: center; }
    .spec .val { font-weight: 700; color: var(--blue); }
    .spec .lbl { font-size: 0.78em; color: var(--text2); }
    .features-list { list-style: none; }
    .features-list li { padding: 4px 0; font-size: 0.9em; }
    .features-list li.pro::before { content: '✅ '; }
    .features-list li.con::before { content: '⚠️ '; color: var(--warning); }
    .match-reasons { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .match-tag { background: rgba(108,92,231,0.15); color: var(--accent2); padding: 4px 10px; border-radius: 10px; font-size: 0.78em; }
    .alt-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; }
    .alt-card h4 { color: var(--text); margin-bottom: 4px; }
    .alt-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 0.75em; font-weight: 700; margin-bottom: 8px; }
    .alt-badge.upgrade { background: rgba(116,185,255,0.15); color: var(--blue); }
    .alt-badge.saving { background: rgba(0,212,170,0.15); color: var(--green); }
    .buy-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .buy-btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9em; transition: all 0.2s; display: inline-block; }
    .buy-btn-primary { background: var(--accent); color: white; }
    .buy-btn-primary:hover { background: var(--accent2); }
    .buy-btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .buy-btn-secondary:hover { border-color: var(--accent); }

    .btn { padding: 12px 28px; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-back { background: none; border: 1px solid var(--border); color: var(--text2); padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-size: 0.9em; }
    .btn-back:hover { border-color: var(--accent); color: var(--accent2); }

    .tier-indicator { display: flex; gap: 4px; margin: 16px 0; }
    .tier-dot { flex: 1; padding: 8px; text-align: center; border-radius: 8px; font-size: 0.8em; border: 1px solid var(--border); color: var(--text2); }
    .tier-dot.active { border-color: var(--accent); background: rgba(108,92,231,0.1); color: var(--accent2); }

    /* All products table */
    .all-products { margin-top: 24px; }
    .prod-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 12px; align-items: center; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
    .prod-row.ranked-1 { border-color: var(--accent); }
    .prod-row .rank { color: var(--accent2); font-weight: 700; font-size: 1.1em; min-width: 24px; }
    .prod-row .price-col { font-weight: 700; color: var(--accent2); }
    .prod-row .match-col { color: var(--green); font-size: 0.9em; }
    @media (max-width: 600px) { .prod-row { grid-template-columns: 1fr auto; } .spec-grid { grid-template-columns: repeat(2, 1fr); } }

    footer { text-align: center; padding: 30px 0; color: var(--text2); font-size: 0.85em; border-top: 1px solid var(--border); margin-top: 40px; }
  </style>
</head>
<body>

<header>
  <div class="container">
    <h1>🛒 ShopBuddy</h1>
    <p>Your smart shopping companion — learn, decide, buy with confidence</p>
  </div>
</header>

<main class="container">

  <!-- HOME VIEW -->
  <div id="home" class="view active">
    <div class="card" style="text-align:center">
      <h2>What are you shopping for?</h2>
      <p style="color:var(--text2)">Each buddy is a specialist that'll teach you what matters, ask the right questions, and find the best deals.</p>
    </div>
    <div class="cat-grid" id="categoryGrid"></div>
  </div>

  <!-- BUDDY VIEW -->
  <div id="buddy" class="view">
    <button class="btn-back" onclick="goHome()">← Back to categories</button>
    <div id="buddyContent"></div>
  </div>

</main>

<footer>
  <div class="container">
    <p>ShopBuddy is a research tool. Prices may vary. Always verify before purchasing.</p>
  </div>
</footer>

<script>
let categories = [];
let currentCat = null;
let answers = {};
let currentQ = 0;

// Coming soon categories
const comingSoon = [
  { id: 'washing-machine', name: 'Washing Machine', icon: '🫧', tagline: 'Spin speed, load size, energy ratings decoded' },
  { id: 'camera', name: 'Camera', icon: '📷', tagline: 'DSLR, mirrorless, or phone? Find your match' },
  { id: 'laptop', name: 'Laptop / Computer', icon: '💻', tagline: 'Specs explained, custom builds, best deals' },
  { id: 'car', name: 'Car', icon: '🚗', tagline: 'New vs used, petrol vs electric, financing' },
  { id: 'skincare', name: 'Skincare / Cream', icon: '🧴', tagline: 'Ingredients decoded, skin type matching' },
  { id: 'tv', name: 'Television', icon: '📺', tagline: 'OLED vs QLED, size guide, sound quality' },
];

document.addEventListener('DOMContentLoaded', async () => {
  categories = await fetch('/api/categories').then(r => r.json());
  renderCategories();
});

function renderCategories() {
  const grid = document.getElementById('categoryGrid');
  let html = categories.map(c => `
    <div class="cat-card" onclick="loadCategory('${c.id}')">
      <div class="icon">${c.icon}</div>
      <div class="name">${c.name}</div>
      <div class="tagline">${c.tagline}</div>
    </div>
  `).join('');

  html += comingSoon.map(c => `
    <div class="cat-card cat-card-coming">
      <div class="icon">${c.icon}</div>
      <div class="name">${c.name}</div>
      <div class="tagline">${c.tagline}</div>
      <span class="coming-badge">Coming Soon</span>
    </div>
  `).join('');

  grid.innerHTML = html;
}

function goHome() {
  document.getElementById('home').classList.add('active');
  document.getElementById('buddy').classList.remove('active');
  answers = {};
  currentQ = 0;
}

async function loadCategory(id) {
  currentCat = await fetch(`/api/category/${id}`).then(r => r.json());
  answers = {};
  currentQ = 0;
  document.getElementById('home').classList.remove('active');
  document.getElementById('buddy').classList.add('active');
  renderBuddy();
}

function renderBuddy() {
  const totalPhases = 3 + currentCat.questions.length; // learn + jargon + questions... + results
  const el = document.getElementById('buddyContent');

  el.innerHTML = `
    <div class="progress-bar" id="progressBar"></div>

    <!-- Phase 1: Things to Consider -->
    <div class="phase active" data-phase="learn">
      <div class="card">
        <h2>${currentCat.icon} ${currentCat.name} — What You Need to Know</h2>
        <p style="color:var(--text2);margin-bottom:20px;font-size:1.05em">${currentCat.intro}</p>
      </div>

      ${currentCat.thingsToConsider.map(c => `
        <div class="consider-card">
          <h4>
            ${c.title}
            <span class="importance importance-${c.importance}">${c.importance.replace('-', ' ')}</span>
          </h4>
          <p><strong>${c.summary}</strong></p>
          <p style="margin-top:8px">${c.detail}</p>
          <div class="rec">💡 ${c.recommendation}</div>
        </div>
      `).join('')}

      <div style="text-align:center;margin-top:24px">
        <button class="btn btn-primary" onclick="goPhase('jargon')" style="padding:14px 40px;font-size:1.05em">
          Got it — show me the jargon buster →
        </button>
      </div>
    </div>

    <!-- Phase 2: Jargon Buster -->
    <div class="phase" data-phase="jargon">
      <div class="card">
        <h2>📖 Jargon Buster</h2>
        <p style="color:var(--text2);margin-bottom:20px">These are the technical terms you'll see when shopping. Don't worry about memorising them — come back anytime!</p>
      </div>
      <div class="jargon-grid">
        ${currentCat.jargon.map(j => `
          <div class="jargon-item">
            <div class="term">${j.term}</div>
            <div class="meaning">${j.meaning}</div>
          </div>
        `).join('')}
      </div>
      <div style="text-align:center;margin-top:24px">
        <button class="btn btn-secondary" onclick="goPhase('learn')" style="margin-right:12px">← Back</button>
        <button class="btn btn-primary" onclick="startQuestions()" style="padding:14px 40px;font-size:1.05em">
          Let's find your match →
        </button>
      </div>
    </div>

    <!-- Phase 3: Questions (dynamic) -->
    <div class="phase" data-phase="questions">
      <div id="questionArea"></div>
    </div>

    <!-- Phase 4: Results -->
    <div class="phase" data-phase="results">
      <div id="resultsArea"></div>
    </div>
  `;

  updateProgress();
}

function goPhase(phase) {
  document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
  document.querySelector(`.phase[data-phase="${phase}"]`).classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  // Simple progress based on current phase
  const active = document.querySelector('.phase.active');
  const phase = active?.dataset.phase;
  const total = 2 + currentCat.questions.length + 1;
  let current = 0;
  if (phase === 'learn') current = 1;
  else if (phase === 'jargon') current = 2;
  else if (phase === 'questions') current = 2 + currentQ + 1;
  else if (phase === 'results') current = total;

  document.getElementById('progressBar').innerHTML = Array.from({ length: total }, (_, i) => {
    const cls = i < current ? 'done' : i === current ? 'current' : '';
    return `<div class="progress-seg ${cls}"></div>`;
  }).join('');
}

function startQuestions() {
  currentQ = 0;
  goPhase('questions');
  renderQuestion();
}

function renderQuestion() {
  const q = currentCat.questions[currentQ];
  const total = currentCat.questions.length;

  document.getElementById('questionArea').innerHTML = `
    <div class="card">
      <div class="q-counter">Question ${currentQ + 1} of ${total}</div>
      <h2>${q.question}</h2>
      <div class="option-grid">
        ${q.options.map(o => `
          <div class="option-card ${answers[q.id] === o.value ? 'selected' : ''}" onclick="selectAnswer('${q.id}', '${o.value}', this)">
            <div class="icon">${o.icon}</div>
            <div class="label">${o.label}</div>
            ${o.desc ? `<div class="desc">${o.desc}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:16px">
      <button class="btn btn-secondary" onclick="${currentQ === 0 ? "goPhase('jargon')" : 'prevQuestion()'}">← Back</button>
      <span></span>
    </div>
  `;
  updateProgress();
}

function selectAnswer(qId, value, el) {
  answers[qId] = value;
  el.closest('.option-grid').querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');

  setTimeout(() => {
    if (currentQ < currentCat.questions.length - 1) {
      currentQ++;
      renderQuestion();
    } else {
      getResults();
    }
  }, 400);
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

async function getResults() {
  goPhase('results');
  document.getElementById('resultsArea').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">🔍 Finding your perfect match...</div>';

  const res = await fetch(`/api/recommend/${currentCat.id}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ answers })
  });
  const data = await res.json();
  renderResults(data);
}

function renderResults(data) {
  const { topPick, upgrade, savingOption, allRanked, tier } = data;

  const renderProduct = (p, badge, badgeClass) => {
    const mopLabel = { false: 'No mop', 'basic-pad': 'Basic pad', 'vibrating': 'Vibrating', 'rotating-dual': 'Dual rotating', 'sonic-vibrating': 'Sonic vibrating' };
    return `
      <h4>${p.name}</h4>
      <div style="color:var(--text2);font-size:0.9em">${p.brand} · ${p.priceRange}</div>
      <div class="match-col" style="margin:8px 0">${p.matchPercent}% match</div>
      <div class="spec-grid">
        <div class="spec"><div class="val">${p.suction.toLocaleString()} Pa</div><div class="lbl">Suction</div></div>
        <div class="spec"><div class="val">${p.nav}</div><div class="lbl">Navigation</div></div>
        <div class="spec"><div class="val">${mopLabel[p.mop] || p.mop}</div><div class="lbl">Mopping</div></div>
        <div class="spec"><div class="val">${p.selfEmpty ? '✅ Yes' : '❌ No'}</div><div class="lbl">Self-empty</div></div>
      </div>
      <p style="color:var(--text2);margin:12px 0;font-style:italic">${p.bestFor}</p>
      <div class="match-reasons">${p.matchReasons.map(r => `<span class="match-tag">${r}</span>`).join('')}</div>
      <div style="margin-top:12px">
        <strong style="color:var(--green)">Features:</strong>
        <ul class="features-list">${p.features.map(f => `<li class="pro">${f}</li>`).join('')}</ul>
      </div>
      <div style="margin-top:8px">
        <strong style="color:var(--warning)">Limitations:</strong>
        <ul class="features-list">${p.missing.map(f => `<li class="con">${f}</li>`).join('')}</ul>
      </div>
      <div class="buy-links">
        ${p.buyLinks.map(l => `<a href="${l.url}" target="_blank" class="buy-btn buy-btn-primary">🔗 ${l.store}</a>`).join('')}
      </div>
    `;
  };

  let html = `
    <div class="card" style="text-align:center">
      <h2>🎯 Your Personalised Recommendations</h2>
      <p style="color:var(--text2)">Based on your answers, here's what we'd recommend:</p>
      <div class="tier-indicator">
        ${Object.entries(currentCat.tiers).map(([k, t]) => `
          <div class="tier-dot ${k === data.answeredBudget ? 'active' : ''}">${t.icon} ${t.label}<br><span style="font-size:0.85em">${t.range}</span></div>
        `).join('')}
      </div>
    </div>

    <!-- Top Pick -->
    <div class="result-hero">
      <div class="badge">⭐ TOP PICK FOR YOU</div>
      ${renderProduct(topPick)}
    </div>
  `;

  // Upgrade option
  if (upgrade) {
    html += `
      <div class="alt-card">
        <span class="alt-badge upgrade">⬆️ UPGRADE OPTION</span>
        <p style="color:var(--text2);font-size:0.85em;margin-bottom:12px">Willing to spend a bit more? This gets you significant upgrades:</p>
        ${renderProduct(upgrade)}
      </div>
    `;
  }

  // Budget option
  if (savingOption) {
    html += `
      <div class="alt-card">
        <span class="alt-badge saving">💰 SAVE MONEY</span>
        <p style="color:var(--text2);font-size:0.85em;margin-bottom:12px">Want to spend less? This still covers your needs:</p>
        ${renderProduct(savingOption)}
      </div>
    `;
  }

  // All ranked
  html += `
    <div class="card all-products">
      <h3>📊 All Products Ranked For You</h3>
      <p style="color:var(--text2);margin-bottom:16px">Every option scored against your specific needs:</p>
      ${allRanked.map((p, i) => `
        <div class="prod-row ${i === 0 ? 'ranked-1' : ''}">
          <div>
            <span class="rank">#${i+1}</span>
            <strong>${p.name}</strong>
            <span style="color:var(--text2);font-size:0.85em"> — ${p.brand}</span>
          </div>
          <div class="price-col">${p.priceRange}</div>
          <div class="match-col">${p.matchPercent}% match</div>
          <div style="font-size:0.8em;color:var(--text2)">${p.tier}</div>
        </div>
      `).join('')}
    </div>
  `;

  html += `
    <div style="text-align:center;margin-top:24px">
      <button class="btn btn-secondary" onclick="startQuestions()" style="margin-right:12px">🔄 Change My Answers</button>
